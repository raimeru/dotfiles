- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- link:
    ~/.config/mpd:
      if: '[ `uname -o` = GNU/Linux ]'
      path: config/mpd
    ~/.config/nvim:
      path: config/nvim
    ~/.config/wezterm:
      path: config/wezterm

- shell:
  - [git submodule update --init --recursive, Installing submodules]